name: Build macOS (Apple Silicon)

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS Desktop (M1)
    runs-on: macos-14  # Apple Silicon (arm64), 固定版本避免 runner 镜像漂移
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2"  # 固定版本，升级时统一修改此处
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-3.29.2

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Build macOS app (Apple Silicon)
        run: flutter build macos --release

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumi-macos-arm64
          path: build/macos/Build/Products/Release/*.app
          retention-days: 14
